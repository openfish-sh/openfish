name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # OpenFish uses Liquid Glass (macOS 26 SDK), so it needs the Xcode 26 toolchain.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build (warnings as errors)
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        run: swift test
